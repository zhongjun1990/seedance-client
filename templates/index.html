<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seedance 2.0 - 视频生成工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .status-success { color: #10b981; }
        .status-pending { color: #f59e0b; }
        .status-failed { color: #ef4444; }
        textarea:focus, input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .fade-in { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen gradient-bg">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-8 fade-in">
            <h1 class="text-4xl font-bold text-white mb-2">🎬 Seedance 2.0</h1>
            <p class="text-white/80">火山引擎 AI 视频生成工具</p>
        </div>

        <!-- Auth Card -->
        <div class="card rounded-2xl shadow-2xl p-8 mb-6 fade-in">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <span>🔐</span> 身份认证
            </h2>
            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Access Key (API Key)</label>
                    <input type="text" id="apiKey" placeholder="输入 Access Key"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Secret Key</label>
                    <input type="password" id="secretKey" placeholder="输入 Secret Key"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg transition-all">
                </div>
            </div>
            <button onclick="getToken()" class="mt-4 btn-primary text-white px-6 py-2 rounded-lg font-medium transition-all w-full md:w-auto">
                🔑 获取 Access Token
            </button>
            <div id="tokenStatus" class="mt-3 text-sm hidden"></div>
            <div class="mt-3">
                <label class="block text-sm font-medium text-gray-700 mb-1">Access Token</label>
                <input type="text" id="accessToken" placeholder="获取后自动填入，或手动粘贴"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg bg-gray-50">
            </div>
        </div>

        <!-- Generation Card -->
        <div class="card rounded-2xl shadow-2xl p-8 mb-6 fade-in">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <span>🎥</span> 视频生成
            </h2>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">视频类型</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="videoType" value="text" checked onchange="toggleImageUpload()"
                               class="w-4 h-4 text-indigo-600">
                        <span>文字生成视频</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="videoType" value="image" onchange="toggleImageUpload()"
                               class="w-4 h-4 text-indigo-600">
                        <span>图片生成视频</span>
                    </label>
                </div>
            </div>

            <div id="imageUploadSection" class="mb-4 hidden">
                <label class="block text-sm font-medium text-gray-700 mb-1">参考图片</label>
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-indigo-400 transition-colors">
                    <input type="file" id="imageFile" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                    <div id="imagePreviewArea" onclick="document.getElementById('imageFile').click()">
                        <div id="noImage" class="text-gray-400">
                            <div class="text-4xl mb-2">🖼️</div>
                            <p>点击上传图片 或 拖拽到此处</p>
                            <p class="text-xs mt-1">支持 JPG/PNG/WebP，最大 10MB</p>
                        </div>
                        <div id="hasImage" class="hidden">
                            <img id="previewImg" class="max-h-40 mx-auto rounded-lg mb-2">
                            <p id="imageName" class="text-sm text-gray-600"></p>
                        </div>
                    </div>
                </div>
                <input type="text" id="imageUrl" placeholder="或直接输入图片 URL"
                       class="w-full mt-2 px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">提示词</label>
                <textarea id="prompt" rows="4" placeholder="描述你想要生成的视频内容..."
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg resize-none"></textarea>
            </div>

            <div class="grid md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">视频比例</label>
                    <select id="aspectRatio" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="16:9">16:9 横屏 (1920×1080)</option>
                        <option value="9:16">9:16 竖屏 (1080×1920)</option>
                        <option value="1:1">1:1 方屏 (1080×1080)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">视频时长</label>
                    <select id="duration" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                        <option value="6">6 秒</option>
                        <option value="10">10 秒</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">参考音频 URL (可选)</label>
                <input type="text" id="audioUrl" placeholder="输入音频 URL"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <button onclick="submitTask()" id="submitBtn"
                    class="btn-primary text-white px-8 py-3 rounded-lg font-medium transition-all w-full text-lg">
                🚀 生成视频
            </button>
        </div>

        <!-- Task Status Card -->
        <div id="taskCard" class="card rounded-2xl shadow-2xl p-8 hidden fade-in">
            <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center gap-2">
                <span>📊</span> 任务状态
            </h2>
            <div class="mb-4">
                <span class="text-sm text-gray-600">Task ID: </span>
                <span id="taskIdDisplay" class="text-sm font-mono text-gray-800"></span>
            </div>
            <div id="progressArea" class="mb-4">
                <div class="flex items-center gap-3 mb-2">
                    <div id="spinner" class="animate-spin rounded-full h-5 w-5 border-2 border-indigo-600 border-t-transparent"></div>
                    <span id="statusText" class="text-gray-700">生成中...</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progressBar" class="bg-indigo-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
            <div id="resultArea" class="hidden">
                <div id="resultContent" class="bg-gray-50 rounded-lg p-4"></div>
            </div>
        </div>

        <!-- Tips -->
        <div class="text-center text-white/60 text-sm mt-6">
            <p>💡 提示：首次使用需配置火山引擎 Access Key 和 Secret Key</p>
            <p class="mt-1">获取地址：<a href="https://console.volcengine.com/visual" target="_blank" class="underline">火山引擎控制台</a></p>
        </div>
    </div>

    <script>
        let uploadedImageUrl = '';
        let currentTaskId = '';
        let pollInterval = null;
        let uploadedFiles = [];

        function toggleImageUpload() {
            const type = document.querySelector('input[name="videoType"]:checked').value;
            const section = document.getElementById('imageUploadSection');
            section.classList.toggle('hidden', type !== 'image');
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                alert('图片大小不能超过 10MB');
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('noImage').classList.add('hidden');
                document.getElementById('hasImage').classList.remove('hidden');
                document.getElementById('imageName').textContent = file.name;
            };
            reader.readAsDataURL(file);
            // 自动上传
            uploadImage(file);
        }

        async function uploadImage(file) {
            const accessToken = document.getElementById('accessToken').value.trim();
            if (!accessToken) {
                alert('请先获取 Access Token');
                return;
            }
            const formData = new FormData();
            formData.append('file', file);
            try {
                const response = await fetch(`/api/upload?access_token=${encodeURIComponent(accessToken)}`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (result.success) {
                    uploadedImageUrl = result.url;
                    document.getElementById('imageUrl').value = result.url;
                } else {
                    alert('上传失败: ' + result.error);
                }
            } catch (e) {
                alert('上传失败: ' + e.message);
            }
        }

        async function getToken() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const secretKey = document.getElementById('secretKey').value.trim();
            if (!apiKey || !secretKey) {
                alert('请输入 Access Key 和 Secret Key');
                return;
            }
            const statusEl = document.getElementById('tokenStatus');
            statusEl.textContent = '正在获取...';
            statusEl.className = 'mt-3 text-sm text-blue-600';
            statusEl.classList.remove('hidden');
            try {
                const response = await fetch('/api/get_token', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({api_key: apiKey, secret_key: secretKey})
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('accessToken').value = result.token;
                    statusEl.textContent = '✅ Token 获取成功';
                    statusEl.className = 'mt-3 text-sm text-green-600';
                } else {
                    statusEl.textContent = '❌ ' + result.error;
                    statusEl.className = 'mt-3 text-sm text-red-600';
                }
            } catch (e) {
                statusEl.textContent = '❌ ' + e.message;
                statusEl.className = 'mt-3 text-sm text-red-600';
            }
        }

        async function submitTask() {
            const accessToken = document.getElementById('accessToken').value.trim();
            if (!accessToken) {
                alert('请先获取 Access Token');
                return;
            }
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) {
                alert('请输入提示词');
                return;
            }
            const videoType = document.querySelector('input[name="videoType"]:checked').value;
            if (videoType === 'image') {
                const imageUrl = document.getElementById('imageUrl').value.trim();
                if (!imageUrl && !uploadedImageUrl) {
                    alert('请上传参考图片或输入图片 URL');
                    return;
                }
            }
            const params = {
                access_token: accessToken,
                prompt: prompt,
                aspect_ratio: document.getElementById('aspectRatio').value,
                duration: parseInt(document.getElementById('duration').value)
            };
            if (videoType === 'image') {
                params.image_url = uploadedImageUrl || document.getElementById('imageUrl').value.trim();
            }
            const audioUrl = document.getElementById('audioUrl').value.trim();
            if (audioUrl) params.audio_url = audioUrl;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 提交中...';
            try {
                const response = await fetch('/api/submit_task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(params)
                });
                const result = await response.json();
                if (result.success) {
                    currentTaskId = result.task_id;
                    showTaskCard(result.task_id);
                    startPolling();
                } else {
                    alert('提交失败: ' + result.error);
                    btn.disabled = false;
                    btn.textContent = '🚀 生成视频';
                }
            } catch (e) {
                alert('提交失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = '🚀 生成视频';
            }
        }

        function showTaskCard(taskId) {
            const card = document.getElementById('taskCard');
            card.classList.remove('hidden');
            document.getElementById('taskIdDisplay').textContent = taskId;
            document.getElementById('progressArea').classList.remove('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('statusText').textContent = '生成中...';
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').textContent = '🚀 生成视频';
            card.scrollIntoView({behavior: 'smooth'});
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(pollTask, 5000);
        }

        async function pollTask() {
            const accessToken = document.getElementById('accessToken').value.trim();
            try {
                const response = await fetch(`/api/query_task?task_id=${encodeURIComponent(currentTaskId)}&access_token=${encodeURIComponent(accessToken)}`);
                const result = await response.json();
                if (result.success) {
                    const data = result.data.data || result.data;
                    const status = data.status;
                    const statusText = document.getElementById('statusText');
                    const progressBar = document.getElementById('progressBar');
                    if (status === 'PROCESSING' || status === 'PENDING') {
                        statusText.textContent = '生成中... ' + (data.progress || '0%');
                        progressBar.style.width = (data.progress || '0%').toString().replace('%', '') + '%';
                    } else if (status === 'SUCCESS') {
                        statusText.textContent = '✅ 生成成功';
                        progressBar.style.width = '100%';
                        clearInterval(pollInterval);
                        showResult(data);
                    } else if (status === 'FAILED') {
                        statusText.textContent = '❌ 生成失败';
                        statusText.className = 'status-failed';
                        clearInterval(pollInterval);
                        showResult(data);
                    } else {
                        statusText.textContent = status;
                    }
                }
            } catch (e) {
                console.error('轮询失败:', e);
            }
        }

        function showResult(data) {
            document.getElementById('progressArea').classList.add('hidden');
            const resultArea = document.getElementById('resultArea');
            resultArea.classList.remove('hidden');
            const content = document.getElementById('resultContent');
            if (data.video_url) {
                content.innerHTML = `
                    <video controls class="w-full rounded-lg" src="${data.video_url}">
                        您的浏览器不支持视频播放
                    </video>
                    <p class="mt-3 text-sm text-gray-600">视频地址: <a href="${data.video_url}" target="_blank" class="text-indigo-600 underline">${data.video_url}</a></p>
                `;
            } else if (data.error) {
                content.innerHTML = `<p class="text-red-600">错误: ${data.error}</p>`;
            } else {
                content.innerHTML = `<pre class="text-sm text-gray-700 overflow-auto">${JSON.stringify(data, null, 2)}</pre>`;
            }
        }
    </script>
</body>
</html>
