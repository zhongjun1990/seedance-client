name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name Seedance2 --add-data "templates;templates" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Seedance2-Windows
          path: dist/Seedance2.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS App
        run: |
          mkdir -p build/Seedance2.app/Contents/MacOS
          mkdir -p build/Seedance2.app/Contents/Resources
          pyinstaller --onedir --windowed --name Seedance2 --add-data "templates:templates" main.py
          cp -r dist/Seedance2/* build/Seedance2.app/Contents/MacOS/
          cp Info.plist build/Seedance2.app/Contents/Info.plist
          chmod +x build/Seedance2.app/Contents/MacOS/Seedance2

      - name: Create DMG
        run: |
          # 在 /tmp 创建 DMG 再复制到 build，避免源目标相同问题
          hdiutil create -volname Seedance2 -srcfolder build/Seedance2.app -ov -format UDZO /tmp/Seedance2.dmg
          cp /tmp/Seedance2.dmg build/Seedance2.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Seedance2-macOS
          path: build/Seedance2.dmg
          retention-days: 30
