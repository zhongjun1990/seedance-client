name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name BatchVideo --add-data "templates;templates" --icon AppIcon.ico main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BatchVideo-Windows
          path: dist/BatchVideo.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS App
        run: |
          mkdir -p build/BatchVideo.app/Contents/MacOS
          mkdir -p build/BatchVideo.app/Contents/Resources
          pyinstaller --onedir --windowed --name BatchVideo --add-data "templates:templates" main.py
          cp -r dist/BatchVideo/* build/BatchVideo.app/Contents/MacOS/
          cp Info.plist build/BatchVideo.app/Contents/Info.plist
          chmod +x build/BatchVideo.app/Contents/MacOS/BatchVideo
          # 复制图标
          cp AppIcon.icns build/BatchVideo.app/Contents/Resources/AppIcon.icns

      - name: Install create-dmg
        run: |
          brew install create-dmg

      - name: Create DMG with custom layout
        run: |
          # 复制 App
          cp -r build/BatchVideo.app dmg_src/
          mkdir -p dmg_src/.background
          # 生成背景图（紫粉渐变 + 提示文字）
          # 用系统 Python 生成背景 PNG
          python3 -c "
from PIL import Image, ImageDraw, ImageFont
w, h = 600, 400
img = Image.new('RGB', (w, h), '#1a1a2e')
draw = ImageDraw.Draw(img)
# 渐变
for y in range(h):
    ratio = y / h
    r = int(102 * (1-ratio) + 233 * ratio)
    g = int(126 * (1-ratio) + 69 * ratio)
    b = int(234 * (1-ratio) + 98 * ratio)
    draw.line([(0, y), (w, y)], fill=(r, g, b))
# 标题
try:
    draw.text((w//2, 60), '批量视频', fill='white', anchor='mm')
    draw.text((w//2, 90), 'BatchVideo', fill='#ffffff99', anchor='mm')
    draw.text((w//2, h-50), '拖动下方图标到 Applications 文件夹即可安装', fill='white', anchor='mm')
except: pass
img.save('dmg_src/.background/background.png')
"
          # 用 create-dmg 创建标准布局 DMG
          create-dmg \
            --volname "批量视频" \
            --volicon "AppIcon.icns" \
            --background "dmg_src/.background/background.png" \
            --window-pos "200,200" \
            --window-size "600,400" \
            --icon-size "80" \
            --icon "BatchVideo.app" "150,120" \
            --hide-extension "BatchVideo.app" \
            --app-drop-link "480,120" \
            build/BatchVideo.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: BatchVideo-macOS
          path: build/BatchVideo.dmg
          retention-days: 30
