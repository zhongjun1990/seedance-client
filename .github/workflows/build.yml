name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name BatchVideo --add-data "templates;templates" --icon AppIcon.ico main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BatchVideo-Windows
          path: dist/BatchVideo.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS App
        run: |
          mkdir -p build/BatchVideo.app/Contents/MacOS
          mkdir -p build/BatchVideo.app/Contents/Resources
          pyinstaller --onedir --windowed --name BatchVideo --add-data "templates:templates" main.py
          cp -r dist/BatchVideo/* build/BatchVideo.app/Contents/MacOS/
          cp Info.plist build/BatchVideo.app/Contents/Info.plist
          chmod +x build/BatchVideo.app/Contents/MacOS/BatchVideo
          # 复制图标
          cp AppIcon.icns build/BatchVideo.app/Contents/Resources/AppIcon.icns

      - name: Create DMG with custom layout
        run: |
          WORKSPACE=$(pwd)/dmg_workspace
          mkdir -p "$WORKSPACE"
          # 复制 app
          cp -r build/BatchVideo.app "$WORKSPACE/"
          # 创建符号链接
          ln -sf /Applications "$WORKSPACE/Applications"
          # 创建 DMG
          hdiutil create -volname "批量视频" -srcfolder "$WORKSPACE" -ov -format UDZO /tmp/BatchVideo.dmg
          cp /tmp/BatchVideo.dmg build/BatchVideo.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: BatchVideo-macOS
          path: build/BatchVideo.dmg
          retention-days: 30
